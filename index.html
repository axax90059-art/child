<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC 樂園 | 讓孩子認識字母</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #ffda79, #ff9a8b, #f2b3ff);
            --card: #ffffff;
            --card-border: #ffd05b;
            --text: #3d2c8d;
            --accent: #ff6f91;
            --shadow: rgba(61, 44, 141, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.7), transparent 35%),
                        radial-gradient(circle at bottom right, rgba(255,255,255,0.5), transparent 30%);
            pointer-events: none;
        }

        .page {
            position: relative;
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        header {
            text-align: center;
            padding: 10px 0 30px;
        }

        h1 {
            font-size: clamp(2.3rem, 4vw, 4rem);
            margin-bottom: 10px;
            letter-spacing: 0.18em;
        }

        .subtitle {
            font-size: 1rem;
            color: #5f4a8b;
            opacity: 0.95;
        }

        .highlight {
            color: #ff6f91;
        }

        .letter-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin: 30px 0;
        }

        .letter-button {
            border: 0;
            border-radius: 28px;
            background: radial-gradient(circle at top left, #fff, #ffe6f1);
            color: var(--text);
            padding: 30px 12px;
            cursor: pointer;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            box-shadow: 0 18px 35px var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .letter-button:hover,
        .letter-button.active {
            transform: translateY(-4px);
            background: #ffe5f0;
            box-shadow: 0 20px 35px rgba(255, 111, 145, 0.22);
        }

        .play-panel {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 30px;
            align-items: stretch;
        }

        @media (max-width: 840px) {
            .play-panel {
                grid-template-columns: 1fr;
            }
        }

        .card-panel,
        .game-panel {
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid rgba(255, 111, 145, 0.25);
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 25px 50px var(--shadow);
            position: relative;
        }

        .card-panel::before,
        .game-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.4), transparent 45%);
            pointer-events: none;
        }

        .big-letter {
            font-size: clamp(6rem, 16vw, 10rem);
            margin: 0;
            text-align: center;
            color: #ff5c8a;
            letter-spacing: 0.08em;
            text-shadow: 0 6px 12px rgba(255, 111, 145, 0.2);
        }

        .word-name {
            text-align: center;
            font-size: 2.2rem;
            margin: 10px 0 6px;
            font-weight: 900;
        }

        .word-hint {
            text-align: center;
            color: #5a3d8c;
            opacity: 0.95;
            margin-bottom: 16px;
        }

        .word-icon {
            width: 100%;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7rem;
            margin: 24px 0;
            border-radius: 32px;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), rgba(255, 111, 145, 0.18));
            border: 2px dashed rgba(255, 111, 145, 0.35);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.75), 0 16px 40px rgba(255, 111, 145, 0.12);
        }

        .description {
            line-height: 1.7;
            color: #4c3a87;
            text-align: center;
        }

        .game-panel h2 {
            margin-top: 0;
            color: #ff5c8a;
        }

        .game-hint {
            font-size: 1rem;
            margin-bottom: 18px;
            color: #432d61;
        }

        .choices {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 14px;
        }

        .choice-btn {
            border: 0;
            padding: 16px 12px;
            border-radius: 16px;
            background: #f8f0ff;
            color: #4f397e;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 10px 20px rgba(79,57,126,0.12);
        }

        .choice-btn:hover {
            transform: translateY(-3px);
            background: #ffe2f5;
        }

        .choice-btn.correct {
            background: #b4ffda;
            color: #197a47;
        }

        .choice-btn.wrong {
            background: #ffd4d4;
            color: #8b1b1b;
        }

        .game-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
            justify-content: center;
        }

        .action-btn {
            border: 0;
            padding: 14px 22px;
            border-radius: 999px;
            background: #ff6f91;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .action-btn:hover {
            background: #ff4780;
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .mode-tab {
            border: 0;
            padding: 12px 18px;
            border-radius: 999px;
            background: #fff6ff;
            color: #6b4498;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 10px 20px rgba(121, 65, 137, 0.1);
        }

        .mode-tab.active {
            background: #ffb0da;
            transform: translateY(-2px);
            color: #3d2c8d;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            color: #5f4a8b;
            font-weight: 700;
        }

        .score-board span {
            background: rgba(255, 255, 255, 0.85);
            padding: 8px 14px;
            border-radius: 999px;
            box-shadow: 0 6px 18px rgba(125, 82, 156, 0.12);
        }

        .message {
            margin-top: 14px;
            min-height: 28px;
            text-align: center;
            font-size: 1rem;
            color: #4f397e;
        }

        .confetti {
            animation: pop 0.8s ease;
        }

        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.06); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <h1>ABC 樂園</h1>
            <p class="subtitle">點選字母、聽發音，再挑戰兩種遊戲模式：找單字、找字母。更多互動、更多分數，玩得更開心！</p>
        </header>

        <section>
            <div class="letter-board" id="letterBoard"></div>
        </section>

        <section class="play-panel">
            <div class="card-panel">
                <h2>字母卡片</h2>
                <div class="big-letter" id="displayLetter">A</div>
                <div class="word-name" id="displayWord">Apple</div>
                <div class="word-icon" id="displayIcon">🍎</div>
                <p class="word-hint" id="displayHint">A is for Apple</p>
                <p class="description">按下任一個字母卡片，聽發音並學習這個字母的單字。你也可以按「再聽一次」練習唷！</p>
                <div class="game-buttons">
                    <button class="action-btn" onclick="speakCurrent()">再聽一次</button>
                    <button class="action-btn" onclick="startGame()">開始遊戲</button>
                </div>
            </div>

            <div class="game-panel">
                <div class="mode-tabs">
                    <button class="mode-tab active" data-mode="word" onclick="setGameMode('word')">找單字</button>
                    <button class="mode-tab" data-mode="letter" onclick="setGameMode('letter')">找字母</button>
                </div>
                <div class="score-board">
                    <span>分數：<strong id="scoreValue">0</strong></span>
                    <span>連對：<strong id="streakValue">0</strong></span>
                </div>
                <h2 id="gameTitle">字母猜猜看</h2>
                <p class="game-hint" id="gameHint">請從下面選出正確的字母單字：</p>
                <div class="choices" id="choices"></div>
                <div class="message" id="gameMessage">按「開始遊戲」開始挑戰！</div>
            </div>
        </section>
    </div>

    <script>
        const letters = [
            { letter: 'A', word: 'Apple', icon: '🍎' },
            { letter: 'B', word: 'Ball', icon: '⚽' },
            { letter: 'C', word: 'Cat', icon: '🐱' },
            { letter: 'D', word: 'Dog', icon: '🐶' },
            { letter: 'E', word: 'Elephant', icon: '🐘' },
            { letter: 'F', word: 'Fish', icon: '🐠' },
            { letter: 'G', word: 'Giraffe', icon: '🦒' },
            { letter: 'H', word: 'Heart', icon: '❤️' },
            { letter: 'I', word: 'Ice Cream', icon: '🍦' },
            { letter: 'J', word: 'Juice', icon: '🧃' },
            { letter: 'K', word: 'Kite', icon: '🪁' },
            { letter: 'L', word: 'Lion', icon: '🦁' },
            { letter: 'M', word: 'Moon', icon: '🌙' },
            { letter: 'N', word: 'Nest', icon: '🪺' },
            { letter: 'O', word: 'Orange', icon: '🍊' },
            { letter: 'P', word: 'Panda', icon: '🐼' },
            { letter: 'Q', word: 'Queen', icon: '👑' },
            { letter: 'R', word: 'Rainbow', icon: '🌈' },
            { letter: 'S', word: 'Sun', icon: '☀️' },
            { letter: 'T', word: 'Turtle', icon: '🐢' },
            { letter: 'U', word: 'Umbrella', icon: '☂️' },
            { letter: 'V', word: 'Violin', icon: '🎻' },
            { letter: 'W', word: 'Whale', icon: '🐳' },
            { letter: 'X', word: 'Xylophone', icon: '🎶' },
            { letter: 'Y', word: 'Yogurt', icon: '🥣' },
            { letter: 'Z', word: 'Zebra', icon: '🦓' }
        ];

        const letterBoard = document.getElementById('letterBoard');
        const displayLetter = document.getElementById('displayLetter');
        const displayWord = document.getElementById('displayWord');
        const displayIcon = document.getElementById('displayIcon');
        const displayHint = document.getElementById('displayHint');
        const choicesContainer = document.getElementById('choices');
        const gameMessage = document.getElementById('gameMessage');
        const scoreValue = document.getElementById('scoreValue');
        const streakValue = document.getElementById('streakValue');

        let current = letters[0];
        let gameAnswer = null;
        let gameMode = 'word';
        let score = 0;
        let streak = 0;

        function createLetterButtons() {
            letters.forEach(item => {
                const button = document.createElement('button');
                button.className = 'letter-button';
                button.textContent = item.letter;
                button.onclick = () => selectLetter(item, button);
                letterBoard.appendChild(button);
            });
        }

        function selectLetter(item, buttonElement) {
            current = item;
            updateCard();
            speakText(`${item.letter}. ${item.word}`);
            document.querySelectorAll('.letter-button').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            bounceButton(buttonElement);
        }

        function bounceButton(button) {
            button.style.transform = 'scale(1.06)';
            setTimeout(() => button.style.transform = '', 180);
        }

        function updateCard() {
            displayLetter.textContent = current.letter;
            displayWord.textContent = current.word;
            displayIcon.textContent = current.icon;
            displayHint.textContent = `${current.letter} is for ${current.word}`;
        }

        function speakText(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function speakCurrent() {
            speakText(`${current.letter}. ${current.word}`);
        }

        function setGameMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
            const title = mode === 'word' ? '字母猜猜看' : '字母找找看';
            const hint = mode === 'word'
                ? '請從下面選出正確的字母單字：'
                : '請從下面選出正確的英文字母：';
            document.getElementById('gameTitle').textContent = title;
            document.getElementById('gameHint').textContent = hint;
            gameMessage.textContent = `按「開始遊戲」開始 ${title}！`;
            startGame();
        }

        function startGame() {
            const randomIndex = Math.floor(Math.random() * letters.length);
            gameAnswer = letters[randomIndex];
            const options = createOptions(gameAnswer, gameMode);
            renderGameOptions(options);
            if (gameMode === 'word') {
                gameMessage.textContent = `找出與 ${gameAnswer.letter} 對應的單字！`;
            } else {
                gameMessage.textContent = `選出正確的字母，單字是 ${gameAnswer.word}！`;
            }
        }

        function createOptions(correct, mode) {
            const choices = [correct];
            while (choices.length < 4) {
                const randomItem = letters[Math.floor(Math.random() * letters.length)];
                if (!choices.some(item => item.letter === randomItem.letter)) {
                    choices.push(randomItem);
                }
            }
            return choices.sort(() => Math.random() - 0.5);
        }

        function renderGameOptions(options) {
            choicesContainer.innerHTML = '';
            options.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = gameMode === 'word' ? item.word : item.letter;
                btn.onclick = () => checkAnswer(item, btn);
                choicesContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected, button) {
            if (!gameAnswer) return;
            const buttons = choicesContainer.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);

            const correct = gameMode === 'word' ? selected.word === gameAnswer.word : selected.letter === gameAnswer.letter;
            if (correct) {
                button.classList.add('correct');
                streak += 1;
                score += 10 + streak * 2;
                updateScore();
                gameMessage.textContent = `答對了！連對 ${streak} 次，超棒！`;
                speakText('Correct! Great job!');
                showConfetti();
            } else {
                button.classList.add('wrong');
                const correctValue = gameMode === 'word' ? gameAnswer.word : gameAnswer.letter;
                const correctButton = Array.from(buttons).find(btn => btn.textContent === correctValue);
                if (correctButton) correctButton.classList.add('correct');
                streak = 0;
                updateScore();
                gameMessage.textContent = `哦！正確答案是 ${correctValue}，再試一次吧！`;
                speakText('Oops! Try again next time.');
            }
        }

        function updateScore() {
            scoreValue.textContent = score;
            streakValue.textContent = streak;
        }

        function showConfetti() {
            gameMessage.classList.add('confetti');
            setTimeout(() => gameMessage.classList.remove('confetti'), 800);
        }

        createLetterButtons();
        updateCard();
    </script>
</body>
</html>
